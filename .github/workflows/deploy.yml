name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Triggers the deploy every time you push to main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies and Build
        run: |
          npm install
          npm run build # This compiles your TS into a build/dist folder

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Change 'dist' to 'build' or '.' depending on where your compiled HTML lives
          path: './dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
